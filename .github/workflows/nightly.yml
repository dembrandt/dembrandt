name: Nightly Liveness

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  liveness:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Liveness chunk ${{ matrix.chunk }}
        run: |
          node -e "
            const sites = JSON.parse(require('fs').readFileSync('test/sites.json','utf8'));
            const chunk = sites.filter((_, i) => i % 4 === ${{ matrix.chunk }});
            require('fs').writeFileSync('test/sites-chunk.json', JSON.stringify(chunk));
            console.log('Chunk ${{ matrix.chunk }}:', chunk.join(', '));
          "
          node test/liveness.mjs sites-chunk.json
        env:
          CI: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-liveness-${{ matrix.chunk }}
          path: test/liveness-report.json
          retention-days: 30
